<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>เค้าขอโทษนะคนดี</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <div id="home-screen" class="screen active">
            <div class="card">
                <div class="image-container">
                    <img src="cute_apology.png" alt="Apology Bear" class="main-img">
                </div>
                <h1>เค้าขอโทษนะ...</h1>
                <p class="message">ดีกันนะคนดี เค้าสัญญาจะเป็นเด็กดี ไม่ดื้อ ไม่ซนแล้วครับ ยกโทษให้เค้านะนะนะ ❤️</p>
                
                <div class="button-group">
                    <button id="yes-btn" class="primary-btn">ยกโทษให้ (ตกลง)</button>
                    <button id="no-btn" class="secondary-btn">ไม่! (งอนต่อ)</button>
                </div>
            </div>
        </div>

        <div id="success-screen" class="screen">
            <div class="card">
                <div class="image-container">
                    <img src="success_celebration.png" alt="Happy Couple" class="main-img">
                </div>
                <h1>เย้! รักที่สุดเลย ❤️</h1>
                <p class="message">ขอบคุณที่ยกโทษให้เค้านะครับ เย็นนี้ไปหาอะไรอร่อยๆ ทานกันนะ เดี๋ยวเค้าเลี้ยงเอง!</p>
                <button id="restart-btn" class="text-btn">ส่งความรักอีกรอบ</button>
            </div>
        </div>
    </div>

    <canvas id="heart-canvas"></canvas>

    <script type="importmap">
    {
      "imports": {
        "canvas-confetti": "https://esm.sh/canvas-confetti@1.9.3"
      }
    }
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
